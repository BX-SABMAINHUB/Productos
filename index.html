<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Tienda</title>
    <!-- Import map Firebase -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background: #f8fafc;
            min-height: 100vh;
            padding: 24px;
            color: #0f172a;
        }

        #app {
            max-width: 1280px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(145deg, #0f172a, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .sub {
            font-size: 0.95rem;
            color: #64748b;
        }

        /* Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 28px;
        }

        .product-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(226, 232, 240, 0.6);
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            border-color: #cbd5e1;
        }

        .product-card .img-wrap {
            height: 200px;
            background: #f1f5f9;
            overflow: hidden;
        }

        .product-card .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .product-card:hover .img-wrap img {
            transform: scale(1.03);
        }

        .product-card .title {
            padding: 18px 16px 20px;
            font-weight: 500;
            font-size: 1.05rem;
            text-align: center;
            color: #1e293b;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
        }

        /* Modal detalle */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            max-width: 540px;
            width: 100%;
            padding: 36px 32px 32px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.25);
            position: relative;
            animation: fadeScale 0.3s ease;
        }

        @keyframes fadeScale {
            from {
                opacity: 0;
                transform: scale(0.94);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content .close-btn {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 26px;
            background: none;
            border: none;
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.2s;
            line-height: 1;
        }

        .modal-content .close-btn:hover {
            color: #0f172a;
        }

        .modal-content h2 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #0f172a;
        }

        .modal-content .detail-image {
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border-radius: 16px;
            margin: 16px 0 20px;
            background: #f1f5f9;
        }

        .modal-content .price {
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
            margin: 6px 0 10px;
        }

        .modal-content .payment-methods {
            background: #f1f5f9;
            padding: 10px 16px;
            border-radius: 12px;
            margin: 10px 0 14px;
            font-size: 0.95rem;
            color: #1e293b;
        }

        .modal-content .description {
            color: #334155;
            line-height: 1.6;
            margin: 10px 0 24px;
        }

        .modal-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-comprar {
            background: #2563eb;
            color: white;
            border: none;
            padding: 16px 28px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-comprar:hover {
            background: #1d4ed8;
        }

        .btn-comprar:active {
            transform: scale(0.97);
        }

        .btn-comprar .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .btn-comprar.loading .spinner {
            display: inline-block;
        }

        .btn-comprar.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-eliminar {
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
            display: none;
            /* solo visible para Owner */
        }

        .btn-eliminar:hover {
            background: #dc2626;
        }

        .btn-eliminar.visible {
            display: block;
        }

        /* Overlay compra (iframe + cabecera) */
        .compra-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .compra-overlay.active {
            display: flex;
        }

        .compra-card {
            background: white;
            border-radius: 32px;
            width: 100%;
            max-width: 900px;
            height: 85vh;
            max-height: 700px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
            animation: fadeScale 0.3s ease;
        }

        .compra-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: #0f172a;
            color: white;
            flex-shrink: 0;
        }

        .compra-header .brand {
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .compra-header .brand span {
            background: #facc15;
            color: #0f172a;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .compra-header .close-compra {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .compra-header .close-compra:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .compra-body {
            flex: 1;
            position: relative;
            background: #f1f5f9;
        }

        .compra-body iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .compra-footer {
            background: #f8fafc;
            padding: 12px 24px;
            text-align: center;
            font-weight: 500;
            color: #b45309;
            border-top: 2px solid #facc15;
            flex-shrink: 0;
            font-size: 0.95rem;
        }

        /* Admin button (x) */
        .admin-btn {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #0f172a;
            color: white;
            border: none;
            font-size: 28px;
            font-weight: 300;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, background 0.2s;
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .admin-btn:hover {
            background: #1e293b;
            transform: scale(1.06);
        }

        /* Panel administrador */
        .admin-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 36px 32px;
            border-radius: 32px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3);
            z-index: 3000;
            width: 90%;
            max-width: 500px;
            display: none;
            animation: fadeScale 0.25s ease;
        }

        .admin-panel.active {
            display: block;
        }

        .admin-panel h3 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: #0f172a;
        }

        .admin-panel label {
            display: block;
            font-weight: 500;
            margin: 14px 0 6px;
            color: #1e293b;
            font-size: 0.9rem;
        }

        .admin-panel input,
        .admin-panel textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-size: 1rem;
            transition: border 0.2s, box-shadow 0.2s;
            background: #f8fafc;
        }

        .admin-panel input:focus,
        .admin-panel textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            background: white;
        }

        .admin-panel textarea {
            resize: vertical;
            min-height: 80px;
        }

        .admin-panel .btn-submit {
            margin-top: 24px;
            background: #0f172a;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
        }

        .admin-panel .btn-submit:hover {
            background: #1e293b;
        }

        .admin-panel .btn-cancel {
            margin-top: 12px;
            background: transparent;
            color: #64748b;
            border: 1.5px solid #e2e8f0;
            padding: 14px;
            border-radius: 40px;
            font-size: 0.95rem;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
        }

        .admin-panel .btn-cancel:hover {
            background: #f1f5f9;
        }

        /* Estado de carga */
        .loading-placeholder {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
            font-size: 1.1rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .modal-content {
                padding: 24px 16px;
            }
            .admin-panel {
                padding: 24px 16px;
            }
            .compra-card {
                height: 90vh;
                max-height: none;
                border-radius: 20px;
            }
            .compra-header .brand {
                font-size: 1rem;
            }
            .admin-btn {
                width: 48px;
                height: 48px;
                font-size: 24px;
                bottom: 20px;
                right: 20px;
            }
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="header">
            <div>
                <h1>🛍️ Mi Tienda</h1>
                <div class="sub">Productos seleccionados</div>
            </div>
        </div>
        <div id="dashboard" class="dashboard">
            <div class="loading-placeholder">Cargando productos...</div>
        </div>
    </div>

    <!-- Botón administrador (x) -->
    <button class="admin-btn" id="adminBtn" title="Administrar productos">✕</button>

    <!-- Modal detalle -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <button class="close-btn" id="closeDetail">✕</button>
            <h2 id="detailTitle">Título</h2>
            <img class="detail-image" id="detailImage" src="" alt="producto" />
            <div class="price" id="detailPrice">$0.00</div>
            <div class="payment-methods" id="detailPayment"><strong>Métodos de pago:</strong> Efectivo, tarjeta</div>
            <div class="description" id="detailDesc">Descripción del producto.</div>
            <div class="modal-actions">
                <button class="btn-comprar" id="comprarBtn">
                    <span class="btn-text">Comprar ahora</span>
                    <span class="spinner"></span>
                </button>
                <button class="btn-eliminar" id="eliminarBtn">🗑️ Eliminar producto</button>
            </div>
        </div>
    </div>

    <!-- Overlay compra con cabecera y iframe -->
    <div class="compra-overlay" id="compraOverlay">
        <div class="compra-card">
            <div class="compra-header">
                <div class="brand">
                    🛒 ibuyproducts
                    <span>compra</span>
                </div>
                <button class="close-compra" id="closeCompra">✕ Cerrar</button>
            </div>
            <div class="compra-body">
                <iframe id="compraIframe" src="about:blank"></iframe>
            </div>
            <div class="compra-footer">⚠️ Si no pones la cantidad correcta, no te daremos el producto.</div>
        </div>
    </div>

    <!-- Panel administrador -->
    <div class="admin-panel" id="adminPanel">
        <h3>➕ Publicar nuevo producto</h3>
        <label for="prodTitle">Título *</label>
        <input type="text" id="prodTitle" placeholder="Ej. Zapatos deportivos" />

        <label for="prodImage">URL de la imagen *</label>
        <input type="url" id="prodImage" placeholder="https://ejemplo.com/imagen.jpg" />

        <label for="prodPrice">Precio *</label>
        <input type="text" id="prodPrice" placeholder="$99.99" />

        <label for="prodPayment">Métodos de pago *</label>
        <input type="text" id="prodPayment" placeholder="Efectivo, tarjeta, transferencia" />

        <label for="prodDesc">Descripción *</label>
        <textarea id="prodDesc" placeholder="Describe el producto..."></textarea>

        <button class="btn-submit" id="submitProduct">Publicar producto</button>
        <button class="btn-cancel" id="cancelAdmin">Cancelar</button>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, onValue, push, set, remove } from "firebase/database";

        // Configuración Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyD13N4-9MjTrmlPwGP7mves0Exje4v2ACw",
            authDomain: "kahoot-8529e.firebaseapp.com",
            databaseURL: "https://kahoot-8529e-default-rtdb.firebaseio.com",
            projectId: "kahoot-8529e",
            storageBucket: "kahoot-8529e.firebasestorage.app",
            messagingSenderId: "313414356056",
            appId: "1:313414356056:web:4aab4587f7df9393008e2d",
            measurementId: "G-8T4CPC1BQ3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const productosRef = ref(db, 'productos');

        // Elementos DOM
        const dashboard = document.getElementById('dashboard');
        const detailModal = document.getElementById('detailModal');
        const closeDetail = document.getElementById('closeDetail');
        const detailTitle = document.getElementById('detailTitle');
        const detailImage = document.getElementById('detailImage');
        const detailPrice = document.getElementById('detailPrice');
        const detailPayment = document.getElementById('detailPayment');
        const detailDesc = document.getElementById('detailDesc');
        const comprarBtn = document.getElementById('comprarBtn');
        const eliminarBtn = document.getElementById('eliminarBtn');

        const compraOverlay = document.getElementById('compraOverlay');
        const compraIframe = document.getElementById('compraIframe');
        const closeCompra = document.getElementById('closeCompra');

        const adminBtn = document.getElementById('adminBtn');
        const adminPanel = document.getElementById('adminPanel');
        const cancelAdmin = document.getElementById('cancelAdmin');
        const submitProduct = document.getElementById('submitProduct');

        const prodTitle = document.getElementById('prodTitle');
        const prodImage = document.getElementById('prodImage');
        const prodPrice = document.getElementById('prodPrice');
        const prodPayment = document.getElementById('prodPayment');
        const prodDesc = document.getElementById('prodDesc');

        // Estado
        let productos = [];
        let selectedProductId = null;
        let isOwner = false; // se activa tras contraseña correcta

        // --- Cargar productos ---
        function cargarProductos() {
            onValue(productosRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    productos = Object.entries(data).map(([id, prod]) => ({ id, ...prod }));
                } else {
                    productos = [];
                }
                renderDashboard();
            });
        }

        // --- Renderizar dashboard ---
        function renderDashboard() {
            if (productos.length === 0) {
                dashboard.innerHTML = `<div class="loading-placeholder">No hay productos disponibles.</div>`;
                return;
            }

            dashboard.innerHTML = productos.map(prod => `
                <div class="product-card" data-id="${prod.id}">
                    <div class="img-wrap">
                        <img src="${prod.imagen || 'https://via.placeholder.com/300x200?text=Sin+imagen'}" alt="${prod.titulo}" loading="lazy" />
                    </div>
                    <div class="title">${prod.titulo}</div>
                </div>
            `).join('');

            document.querySelectorAll('.product-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = card.dataset.id;
                    const prod = productos.find(p => p.id === id);
                    if (prod) abrirDetalle(prod);
                });
            });
        }

        // --- Abrir detalle ---
        function abrirDetalle(prod) {
            selectedProductId = prod.id;
            detailTitle.textContent = prod.titulo;
            detailImage.src = prod.imagen || 'https://via.placeholder.com/500x240?text=Sin+imagen';
            detailImage.alt = prod.titulo;
            detailPrice.textContent = prod.precio || 'Precio no especificado';
            detailPayment.innerHTML = `<strong>Métodos de pago:</strong> ${prod.metodosPago || 'No especificados'}`;
            detailDesc.textContent = prod.descripcion || 'Sin descripción.';

            // Mostrar botón eliminar solo si Owner
            if (isOwner) {
                eliminarBtn.classList.add('visible');
            } else {
                eliminarBtn.classList.remove('visible');
            }

            // Resetear botón comprar
            comprarBtn.classList.remove('loading');
            comprarBtn.querySelector('.btn-text').textContent = 'Comprar ahora';

            detailModal.classList.add('active');
        }

        // --- Cerrar detalle ---
        function cerrarDetalle() {
            detailModal.classList.remove('active');
            comprarBtn.classList.remove('loading');
        }

        closeDetail.addEventListener('click', cerrarDetalle);
        detailModal.addEventListener('click', (e) => {
            if (e.target === detailModal) cerrarDetalle();
        });

        // --- Comprar ahora ---
        comprarBtn.addEventListener('click', () => {
            if (comprarBtn.classList.contains('loading')) return;

            comprarBtn.classList.add('loading');
            comprarBtn.querySelector('.btn-text').textContent = 'Pensando...';

            setTimeout(() => {
                cerrarDetalle();
                // Mostrar overlay de compra con iframe
                compraIframe.src = 'https://ibuyproducts.vercel.app';
                compraOverlay.classList.add('active');
                comprarBtn.classList.remove('loading');
                comprarBtn.querySelector('.btn-text').textContent = 'Comprar ahora';
            }, 5000);
        });

        // --- Cerrar compra overlay ---
        closeCompra.addEventListener('click', () => {
            compraOverlay.classList.remove('active');
            compraIframe.src = 'about:blank';
        });

        // --- Eliminar producto (solo Owner) ---
        eliminarBtn.addEventListener('click', () => {
            if (!selectedProductId) return;
            if (!isOwner) return;

            const confirmar = confirm(`¿Estás seguro de eliminar "${detailTitle.textContent}"?`);
            if (!confirmar) return;

            const prodRef = ref(db, `productos/${selectedProductId}`);
            remove(prodRef)
                .then(() => {
                    alert('Producto eliminado correctamente.');
                    cerrarDetalle();
                })
                .catch((error) => {
                    console.error(error);
                    alert('Error al eliminar el producto.');
                });
        });

        // --- Administrador (contraseña) ---
        adminBtn.addEventListener('click', () => {
            const password = prompt('🔐 Ingresa la contraseña de administrador:');
            if (password === 'Owner') {
                isOwner = true;
                adminPanel.classList.add('active');
                // Limpiar campos
                prodTitle.value = '';
                prodImage.value = '';
                prodPrice.value = '';
                prodPayment.value = '';
                prodDesc.value = '';
                // Si hay un detalle abierto, actualizar visibilidad de eliminar
                if (detailModal.classList.contains('active') && selectedProductId) {
                    const prod = productos.find(p => p.id === selectedProductId);
                    if (prod) abrirDetalle(prod);
                }
            } else if (password !== null) {
                alert('Contraseña incorrecta.');
            }
        });

        // --- Cancelar admin ---
        cancelAdmin.addEventListener('click', () => {
            adminPanel.classList.remove('active');
        });

        // --- Publicar producto ---
        submitProduct.addEventListener('click', async () => {
            const titulo = prodTitle.value.trim();
            const imagen = prodImage.value.trim();
            const precio = prodPrice.value.trim();
            const metodosPago = prodPayment.value.trim();
            const descripcion = prodDesc.value.trim();

            if (!titulo || !imagen || !precio || !metodosPago || !descripcion) {
                alert('Todos los campos son obligatorios.');
                return;
            }

            try {
                new URL(imagen);
            } catch (_) {
                alert('La URL de la imagen no es válida.');
                return;
            }

            const nuevoProducto = {
                titulo,
                imagen,
                precio,
                metodosPago,
                descripcion
            };

            try {
                await push(productosRef, nuevoProducto);
                alert('✅ Producto publicado correctamente.');
                adminPanel.classList.remove('active');
            } catch (error) {
                console.error(error);
                alert('Error al publicar el producto.');
            }
        });

        // --- Iniciar ---
        cargarProductos();
    </script>
</body>
</html>
